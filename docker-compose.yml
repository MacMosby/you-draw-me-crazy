#version: "3.3"

#command: overwrites CMD in Dockerfile if necessary
services:
  backend:
    build:
      context: ./requirements/backend
      dockerfile: Dockerfile
    container_name: transcendence-backend
    command: /app/start.sh
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./requirements/backend:/app
      - backend_node_modules:/app/node_modules
  frontend:
    build:
      context: ./requirements/frontend
      dockerfile: Dockerfile
    container_name: transcendence-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./requirements/frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev
  postgres:
    image: postgres:16-alpine
    container_name: transcendence-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h 127.0.0.1 -p 5432"]
      interval: 2s
      timeout: 3s
      retries: 15



volumes:
  postgres_data:
  frontend_node_modules:
  backend_node_modules:
