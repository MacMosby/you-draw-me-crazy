services:
  backend:
    build:
      context: ./requirements/backend
      dockerfile: Dockerfile
    container_name: backend
    command: /app/start.sh
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./requirements/backend:/app
      - backend_node_modules:/app/node_modules
      - backend_dist:/app/dist
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/auth"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 120s

  frontend:
    build:
      context: ./requirements/frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./requirements/frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev

  postgres:
    image: postgres:16-alpine
    container_name: transcendence-postgres
    environment:
      POSTGRES_DB: transcendence
      POSTGRES_USER: transcendence_user
      POSTGRES_PASSWORD: transcendence_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h 127.0.0.1 -p 5432"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  postgres_data:
  frontend_node_modules:
  backend_node_modules:
  backend_dist: